name: Deploy My Memo to GitHub Pages

# docs/ 를 GitHub Pages(Actions)로 배포합니다.
#
# ⚠ 토큰은 배포물에 넣지 않습니다 — 공개된 config.js 에 쓰기 토큰이 있으면
#   GitHub 보안 스캐닝이 그 토큰을 자동으로 폐기(revoke)하기 때문입니다.
#   쓰기(저장/수정/삭제)는 관리자가 ⚙ 관리자 설정에서 본인 PAT 를 입력하면
#   그 브라우저(localStorage)에서만 동작합니다. 공개된 사이트 자체는 읽기 전용입니다.
#
# 사전 준비:
#  1) Settings → Pages → Build and deployment → Source: "GitHub Actions"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject runtime config (owner/repo/branch only — no token)
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_FULL: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          REPO="${REPO_FULL#*/}"
          # 토큰은 의도적으로 넣지 않습니다. 공개 config.js 에 실린 토큰은 GitHub
          # 보안 스캐닝에 자동 폐기되므로, 쓰기는 관리자가 브라우저 ⚙ 관리자 설정에
          # 직접 입력한 PAT(해당 브라우저 localStorage 에만 저장)로만 동작합니다.
          cat > docs/config.js <<EOF
          /* 배포 시 자동 생성됨 (.github/workflows/deploy.yml). 저장소에 커밋되지 않습니다.
             token 은 의도적으로 비워 둡니다 — 쓰기 토큰은 ⚙ 관리자 설정(브라우저)에만 저장하세요. */
          window.MYMEMO_CONFIG = {
            owner: "${OWNER}",
            repo: "${REPO}",
            branch: "${BRANCH}",
            token: ""
          };
          EOF
          echo "config.js 생성 완료 (owner=${OWNER}, repo=${REPO}, branch=${BRANCH}, token=없음 → 브라우저에서 입력)"

      - name: Ensure Pages source = GitHub Actions (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 브랜치 배포(legacy)면 주입된 config.js가 무시됩니다. workflow 로 전환 시도.
          if gh api -X PUT "repos/${{ github.repository }}/pages" -f build_type=workflow >/dev/null 2>&1; then
            echo "Pages build_type → workflow 로 전환했습니다."
          else
            echo "::warning::Pages 소스를 자동 전환하지 못했습니다(권한). Settings → Pages → Source 를 'GitHub Actions'로 직접 변경하세요."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
